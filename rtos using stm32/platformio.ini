[env:nucleo_f103rb]
platform = ststm32
board = nucleo_f103rb
framework = stm32cube
upload_protocol = stlink

lib_deps =
    mincrmatt12/STM32Cube Middleware-FreeRTOS@10.3.1+f4-1.26.1

build_flags =
    -Iinclude
    -I lib/SEGGER_RTT
    -I lib/SEGGER_SYSVIEW
    -I lib/Config

monitor_speed = 115200

custom_freertos_config_location = include/FreeRTOSConfig.h