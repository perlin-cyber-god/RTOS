[env:nucleo_f103rb]
platform = ststm32
board = nucleo_f103rb
framework = stm32cube
upload_protocol = stlink
monitor_speed = 115200

lib_deps =
    mincrmatt12/STM32Cube Middleware-FreeRTOS@10.3.1+f4-1.26.1

build_flags =
    -Iinclude
    -D configUSE_TIMERS=1

lib_archive = no
custom_freertos_config_location = include/FreeRTOSConfig.h